name: Update Prices

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  scrape-and-update:
    runs-on: windows-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -r requirements.txt

    - name: Check Athens 08:00 schedule
      id: athens_time
      shell: pwsh
      run: |
        $utcNow = (Get-Date).ToUniversalTime()
        $athensTime = [System.TimeZoneInfo]::ConvertTimeBySystemTimeZoneId($utcNow, "GTB Standard Time")
        $shouldRun = $athensTime.Hour -eq 8
        "run_scrape=$shouldRun" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        Write-Host "UTC now: $utcNow"
        Write-Host "Athens now: $athensTime"
        Write-Host "Should run scrape: $shouldRun"
    
    - name: Run price scraper
      if: steps.athens_time.outputs.run_scrape == 'True'
      run: python scrape_prices.py
    
    - name: Commit and push if changes
      if: steps.athens_time.outputs.run_scrape == 'True'
      shell: pwsh
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add prices.json price_history.json
        if (-not (git diff --staged --quiet)) {
          $timestamp = (Get-Date).ToUniversalTime().ToString("yyyy-MM-dd HH:mm:ss UTC")
          git commit -m "Update prices - $timestamp"
          git push
        }
