name: Update Prices

on:
  schedule:
    # Run at 05:00 UTC (08:00 Greece time when UTC+3)
    - cron: '0 5 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  scrape-and-update:
    runs-on: windows-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6.0.2
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Run only at 08:00 Europe/Athens
      shell: pwsh
      run: |
        # Windows timezone id for Athens is 'GTB Standard Time'
        try {
          $tz = [System.TimeZoneInfo]::FindSystemTimeZoneById("GTB Standard Time")
        } catch {
          Write-Host "Could not find 'GTB Standard Time' timezone. Proceeding (no skip)."
          exit 0
        }
        $now = [System.TimeZoneInfo]::ConvertTimeFromUtc((Get-Date).ToUniversalTime(), $tz)
        Write-Host "Greece time: $now"
        if ($now.Hour -ne 8) {
          Write-Host "Not 08:00 in Greece; skipping run."
          exit 0
        }
    
    - name: Set up Python
      uses: actions/setup-python@v6.2.0
      with:
        python-version: '3.14'
    
    - name: Install dependencies
      run: |
        pip install selenium beautifulsoup4 chromedriver-autoinstaller
    
    - name: Run price scraper
      run: python scrape_prices.py
    
    - name: Commit and push if changes
      shell: pwsh
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add prices.json
        $changes = git diff --staged --quiet
        if ($LASTEXITCODE -ne 0) {
          $timestamp = (Get-Date).ToUniversalTime().ToString("yyyy-MM-dd HH:mm:ss UTC")
          git commit -m "Update prices - $timestamp"
          git push
        }
